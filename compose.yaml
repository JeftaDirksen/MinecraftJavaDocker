services:
  minecraftjava:
    build: .
    container_name: minecraftjava
    ports:
      - "25565:25565"
    volumes:
      - ./server:/data/server
    environment:
      - MEMORY=${MEMORY:-4G}
      - EULA=${EULA:-true}
      - SEED=${SEED:-abc}
      - NVG_URL=${NVG_URL}
      - NVG_SECRET=${NVG_SECRET}
    restart: unless-stopped
    tty: true
    stdin_open: true
